name: Build and Quality Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Xvfb
      run: sudo apt-get install -y xvfb

    - name: Build and Test
      run: xvfb-run --auto-servernum mvn clean verify -B

    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: target/site/jacoco/jacoco.xml
        format: jacoco

    - name: SonarCloud Scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: mvn -B sonar:sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.projectKey=mohamedjama-farah_Art-Gallery-project- -Dsonar.organization=mohamedjama-farah -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
